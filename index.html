<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: monospace;
    }
    
    .radar-container {
      position: relative;
      width: 400px;
      height: 400px;
    }
    
    .radar-screen {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: #001800;
      border: 2px solid #0f0;
      position: relative;
      overflow: hidden;
    }
    
    .radar-sweep {
      position: absolute;
      width: 200px;
      height: 200px;
      transform-origin: 100% 100%;
      background: linear-gradient(90deg, transparent 50%, rgba(0, 255, 0, 0.2) 100%);
      animation: sweep 4s infinite linear;
    }
    
    .radar-lines {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    
    .radar-circle {
      position: absolute;
      border: 1px solid rgba(0, 255, 0, 0.3);
      border-radius: 50%;
    }
    
    .radar-line {
      position: absolute;
      width: 100%;
      height: 1px;
      background: rgba(0, 255, 0, 0.3);
      transform-origin: center;
    }
    
    .blip {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #0f0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    
    .controls {
      position: absolute;
      top: 420px;
      color: #0f0;
      text-align: center;
      width: 100%;
    }
    
    button {
      background: #001800;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 5px 10px;
      margin: 5px;
      cursor: pointer;
    }
    
    .readings {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #0f0;
    }
    
    @keyframes sweep {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="radar-container">
    <div class="readings">
      Range: <span id="range">0</span>nm<br>
      Bearing: <span id="bearing">0</span>°
    </div>
    
    <div class="radar-screen">
      <div class="radar-lines" id="radar-lines"></div>
      <div class="radar-sweep"></div>
    </div>
    
    <div class="controls">
      <button onclick="addRandomTarget()">Add Target</button>
      <button onclick="clearTargets()">Clear Targets</button>
    </div>
  </div>

  <script>

    const radarLines = document.getElementById('radar-lines');

    for(let i = 1; i <= 4; i++) {
      const circle = document.createElement('div');
      circle.className = 'radar-circle';
      circle.style.width = `${i * 25}%`;
      circle.style.height = `${i * 25}%`;
      circle.style.top = `${50 - (i * 12.5)}%`;
      circle.style.left = `${50 - (i * 12.5)}%`;
      radarLines.appendChild(circle);
    }
    
  
    for(let i = 0; i < 8; i++) {
      const line = document.createElement('div');
      line.className = 'radar-line';
      line.style.transform = `rotate(${i * 45}deg)`;
      radarLines.appendChild(line);
    }
    
    const targets = [];
    
    function addRandomTarget() {
      const angle = Math.random() * 360;
      const distance = Math.random() * 180;
      const x = Math.cos(angle * Math.PI / 180) * distance + 200;
      const y = Math.sin(angle * Math.PI / 180) * distance + 200;
      
      const blip = document.createElement('div');
      blip.className = 'blip';
      blip.style.left = `${x}px`;
      blip.style.top = `${y}px`;
      
      document.querySelector('.radar-screen').appendChild(blip);
      targets.push(blip);
      
    
      document.getElementById('range').textContent = Math.round(distance / 4);
      document.getElementById('bearing').textContent = Math.round(angle);
    }
    
    function clearTargets() {
      targets.forEach(target => target.remove());
      targets.length = 0;
      document.getElementById('range').textContent = '0';
      document.getElementById('bearing').textContent = '0';
    }
  </script>
</body>
</html>
